site_name: Kanama
site_description: Kotlin GDExtension for Godot via Project Panama (FFM)
site_url: https://falcon4ever.github.io/kanama/
repo_name: falcon4ever/kanama
repo_url: https://github.com/falcon4ever/kanama
theme:
  name: material
  logo: assets/kanama-logo.png
  favicon: assets/kanama-logo.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/index.md
      - The Editor Loop: getting-started/editor-workflow.md
  - Game Development:
      - Writing Kotlin Scripts: game-dev/scripts.md
      - Calling Godot APIs: game-dev/godot-api.md
      - Exports and Resources: game-dev/properties-resources.md
      - Signals and Callbacks: game-dev/signals.md
      - Multiplayer: game-dev/multiplayer.md
      - Porting GDScript: game-dev/porting-gdscript.md
      - Kotlin Style: game-dev/style-guide.md
  - Exporting:
      - Desktop and Packaging: exporting/desktop.md
      - Android Experimental: exporting/android.md
  - Reference:
      - Version Support: reference/version-support.md
      - API Coverage: reference/api-coverage.md
      - Wrapper Generator Report: reference/wrapper-generator-report.md
      - C# Comparison: reference/c-sharp-compat.md
  - Contributing:
      - Contributor Guide: contributing/index.md
      - Architecture: contributing/architecture.md
      - Wrapper Maintenance: contributing/wrapper-maintenance.md
      - Hot Reload Internals: contributing/hot-reload-internals.md
      - Demo Porting Rules: contributing/demo-porting-rules.md
      - Android Internals: contributing/android-internals.md
